<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 坦克大战 - Tank Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 2px solid #3a3a5c;
        }

        .title {
            color: #e94560;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            color: #c0c0c0;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat .icon {
            font-size: 20px;
        }
        .stat .value {
            color: #f0c040;
            font-weight: bold;
            font-size: 18px;
        }

        canvas {
            border: 3px solid #3a3a5c;
            border-radius: 5px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 10px rgba(233, 69, 96, 0.2);
        }

        .controls {
            display: flex;
            gap: 30px;
            color: #888;
            font-size: 13px;
        }
        .controls span {
            color: #e94560;
            font-weight: bold;
        }

        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .game-over-overlay.active {
            display: flex;
        }

        .game-over-box {
            background: #1a1a2e;
            border: 3px solid #e94560;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
        }
        .game-over-box h2 {
            color: #e94560;
            font-size: 36px;
            margin-bottom: 15px;
        }
        .game-over-box .final-score {
            color: #f0c040;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .game-over-box button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .game-over-box button:hover {
            background: #ff6b81;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <div class="title">🎮 坦 克 大 战</div>
            <div class="stats">
                <div class="stat">
                    <span class="icon">🎯</span>
                    <span>分数:</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="icon">🛡️</span>
                    <span>等级:</span>
                    <span class="value" id="level">1</span>
                </div>
                <div class="stat">
                    <span class="icon">❤️</span>
                    <span>生命:</span>
                    <span class="value" id="lives">3</span>
                </div>
                <div class="stat">
                    <span class="icon">💀</span>
                    <span>击杀:</span>
                    <span class="value" id="kills">0</span>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <div>🎮 <span>W A S D</span> 移动</div>
            <div>🔫 <span>空格 / 鼠标左键</span> 射击</div>
            <div>🔄 <span>R</span> 重新开始</div>
            <div>⏸️ <span>P</span> 暂停</div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
            <h2 id="gameOverTitle">游戏结束</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button onclick="restartGame()">🔄 再来一局</button>
        </div>
    </div>

    <script>
        // ==================== 坦克大战游戏引擎 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // 音频系统 (Web Audio API)
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        function playSound(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function sfxShoot() { playSound(200, 'square', 0.1, 0.05); }
        function sfxHit() { playSound(80, 'sawtooth', 0.3, 0.05); }
        function sfxExplosion() { playSound(50, 'sawtooth', 0.5, 0.08); }
        function sfxPowerUp() { playSound(600, 'sine', 0.2, 0.1); playSound(800, 'sine', 0.2, 0.1); }
        function sfxLevelUp() { playSound(400, 'square', 0.1, 0.1); playSound(600, 'square', 0.1, 0.1); playSound(800, 'square', 0.1, 0.2); }

        // 游戏状态
        const STATE = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover',
            LEVEL_COMPLETE: 'level_complete'
        };

        let gameState = STATE.MENU;
        let score = 0;
        let level = 1;
        let lives = 3;
        let kills = 0;
        let playerTank, enemies, bullets, particles, powerUps;
        let walls = [];
        let keys = {};
        let mouse = { x: 0, y: 0, down: false };
        let shootCooldown = 0;
        let enemySpawnTimer = 0;
        let levelTransitionTimer = 0;
        let shakeTimer = 0;
        let shakeIntensity = 0;

        // 网格和地图
        const TILE = 40;
        const COLS = W / TILE;   // 20
        const ROWS = H / TILE;   // 15
        const MAPS = [];

        // 预定义地图 (0=空地, 1=砖墙, 2=钢墙, 3=水, 4=树)
        function generateMap(levelNum) {
            const map = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

            // 边界砖墙
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
                        map[r][c] = 1;
                    }
                }
            }

            // 内部障碍物 (根据等级增加复杂度)
            const obstacleCount = 40 + levelNum * 8;
            const patterns = [
                // 十字形
                () => {
                    for (let r = 2; r < ROWS - 2; r += 3) {
                        for (let c = 2; c < COLS - 2; c += 3) {
                            map[r][c] = 1;
                            if (Math.random() < 0.5) map[r][c + 1] = 1;
                            if (Math.random() < 0.5) map[r + 1][c] = 1;
                        }
                    }
                },
                // 走廊式
                () => {
                    for (let r = 3; r < ROWS - 3; r += 4) {
                        for (let c = 1; c < COLS - 1; c++) {
                            map[r][c] = 1;
                        }
                    }
                    // 留出通道
                    for (let r = 3; r < ROWS - 3; r += 4) {
                        const gap = 2 + Math.floor(Math.random() * (COLS - 4));
                        map[r][gap] = 0;
                        map[r][gap + 1] = 0;
                    }
                },
                // 堡垒式
                () => {
                    const forts = [
                        [3, 3], [3, COLS - 4], [ROWS - 4, 3], [ROWS - 4, COLS - 4],
                        [Math.floor(ROWS / 2), Math.floor(COLS / 2)]
                    ];
                    forts.forEach(([fr, fc]) => {
                        for (let r = fr - 1; r <= fr + 1; r++) {
                            for (let c = fc - 1; c <= fc + 1; c++) {
                                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                                    map[r][c] = (r === fr && c === fc) ? 2 : 1;
                                }
                            }
                        }
                    });
                }
            ];

            // 混合使用模式
            const pattern = patterns[levelNum % patterns.length];
            pattern();

            // 确保玩家出生点 (左下) 和几个出生点为空
            const clearAreas = [
                [ROWS - 2, 2], [ROWS - 2, 3], [ROWS - 3, 2], [ROWS - 3, 3], // 玩家
                [2, COLS - 3], [2, COLS - 4], [3, COLS - 3], [3, COLS - 4], // 敌人1
                [2, 2], [2, 3], [3, 2], [3, 3],                             // 敌人2
                [ROWS - 2, COLS - 3], [ROWS - 2, COLS - 4],                   // 敌人3
            ];
            clearAreas.forEach(([r, c]) => {
                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    map[r][c] = 0;
                }
            });

            return map;
        }

        function buildWalls(map) {
            const w = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === 1) {
                        w.push(new Wall(c * TILE, r * TILE, TILE, TILE, 'brick'));
                    } else if (map[r][c] === 2) {
                        w.push(new Wall(c * TILE, r * TILE, TILE, TILE, 'steel'));
                    }
                }
            }
            return w;
        }

        // ==================== 游戏对象类 ====================

        class Tank {
            constructor(x, y, color, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.width = TILE - 6;
                this.height = TILE - 6;
                this.speed = 2.5;
                this.color = color;
                this.direction = 'up'; // up, down, left, right
                this.isPlayer = isPlayer;
                this.alive = true;
                this.shootCooldown = 0;
                this.shootRate = isPlayer ? 20 : 80;
                this.bulletSpeed = 5;
                this.health = isPlayer ? 3 : 1;
                this.aiTimer = 0;
                this.aiDirectionChange = 60 + Math.floor(Math.random() * 120);
                this.aiShootChance = isPlayer ? 0 : 0.02;
                this.invincible = 0;
                this.flashTimer = 0;
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    w: this.width,
                    h: this.height,
                };
            }

            move(dx, dy) {
                const newX = this.x + dx;
                const newY = this.y + dy;

                // 边界检测
                if (newX < 0 || newX + this.width > W || newY < 0 || newY + this.height > H) {
                    return false;
                }

                // 墙壁碰撞检测
                for (const wall of walls) {
                    if (wall.alive && this.collidesWith(newX, newY, this.width, this.height, wall)) {
                        return false;
                    }
                }

                // 其他坦克碰撞 (非自己)
                const allTanks = this.isPlayer ? enemies : [playerTank, ...enemies.filter(e => e !== this && e.alive)];
                for (const other of allTanks) {
                    if (other && other.alive && other !== this) {
                        if (this.collidesWith(newX, newY, this.width, this.height, other.getBounds())) {
                            return false;
                        }
                    }
                }

                this.x = newX;
                this.y = newY;
                return true;
            }

            collidesWith(x, y, w, h, targetBounds) {
                return (
                    x < targetBounds.x + targetBounds.w &&
                    x + w > targetBounds.x &&
                    y < targetBounds.y + targetBounds.h &&
                    y + h > targetBounds.y
                );
            }

            shoot() {
                if (this.shootCooldown > 0) return null;
                if (!this.alive) return null;

                this.shootCooldown = this.shootRate;
                const cx = this.x + this.width / 2;
                const cy = this.y + this.height / 2;
                let bx = cx;
                let by = cy;
                let vx = 0, vy = 0;

                switch (this.direction) {
                    case 'up':    by = this.y - 4; vx = 0; vy = -this.bulletSpeed; break;
                    case 'down':  by = this.y + this.height + 4; vx = 0; vy = this.bulletSpeed; break;
                    case 'left':  bx = this.x - 4; vx = -this.bulletSpeed; vy = 0; break;
                    case 'right': bx = this.x + this.width + 4; vx = this.bulletSpeed; vy = 0; break;
                }

                return new Bullet(bx, by, vx, vy, this.isPlayer);
            }

            update() {
                if (!this.alive) return;
                if (this.shootCooldown > 0) this.shootCooldown--;
                if (this.invincible > 0) this.invincible--;
                if (this.flashTimer > 0) this.flashTimer--;
            }

            takeDamage() {
                if (this.invincible > 0) return false;
                this.health--;
                this.invincible = 30;
                if (this.health <= 0) {
                    this.alive = false;
                    createExplosion(this.x + this.width / 2, this.y + this.height / 2, 12);
                    sfxExplosion();
                    return true;
                }
                sfxHit();
                createExplosion(this.x + this.width / 2, this.y + this.height / 2, 5);
                return false;
            }

            draw(ctx) {
                if (!this.alive) return;
                if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                const angleMap = { up: 0, right: Math.PI / 2, down: Math.PI, left: -Math.PI / 2 };
                ctx.rotate(angleMap[this.direction] || 0);

                // 车身
                const hw = this.width / 2;
                const hh = this.height / 2;

                // 履带
                ctx.fillStyle = '#333';
                ctx.fillRect(-hw, -hh, hw * 0.3, hh * 2);
                ctx.fillRect(hw * 0.7, -hh, hw * 0.3, hh * 2);

                // 车身主体
                ctx.fillStyle = this.color;
                ctx.fillRect(-hw * 0.6, -hh * 0.8, hw * 1.2, hh * 1.6);

                // 炮塔
                ctx.fillStyle = this.isPlayer ? '#4ecdc4' : '#ff6b6b';
                ctx.beginPath();
                ctx.arc(0, 0, hw * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // 炮管
                ctx.fillStyle = '#ddd';
                ctx.fillRect(-3, -hh * 0.7, 6, hh * 0.8);

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(-hw * 0.3, -hh * 0.6, hw * 0.5, hh * 0.4);

                ctx.restore();

                // 生命条 (仅玩家)
                if (this.isPlayer && this.health > 0) {
                    const barW = this.width;
                    const barH = 4;
                    const bx = this.x;
                    const by = this.y - 8;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(bx, by, barW, barH);
                    const hpRatio = this.health / 3;
                    ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
                    ctx.fillRect(bx, by, barW * hpRatio, barH);
                }
            }
        }

        class Wall {
            constructor(x, y, w, h, type = 'brick') {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.type = type; // 'brick' or 'steel'
                this.alive = true;
            }

            getBounds() {
                return { x: this.x, y: this.y, w: this.w, h: this.h };
            }

            destroy() {
                if (this.type === 'steel') return false; // 钢墙不可破坏
                this.alive = false;
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;
                if (this.type === 'steel') {
                    ctx.fillStyle = '#7f8c8d';
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    ctx.strokeStyle = '#95a5a6';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x + 2, this.y + 2, this.w - 4, this.h - 4);
                    // 铆钉
                    ctx.fillStyle = '#555';
                    ctx.fillRect(this.x + 4, this.y + 4, 6, 6);
                    ctx.fillRect(this.x + this.w - 10, this.y + 4, 6, 6);
                    ctx.fillRect(this.x + 4, this.y + this.h - 10, 6, 6);
                    ctx.fillRect(this.x + this.w - 10, this.y + this.h - 10, 6, 6);
                } else {
                    ctx.fillStyle = '#c0392b';
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    // 砖块纹理
                    ctx.strokeStyle = '#a93226';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(this.x, this.y, this.w / 2, this.h / 2);
                    ctx.strokeRect(this.x + this.w / 2, this.y, this.w / 2, this.h / 2);
                    ctx.strokeRect(this.x, this.y + this.h / 2, this.w / 2, this.h / 2);
                    ctx.strokeRect(this.x + this.w / 2, this.y + this.h / 2, this.w / 2, this.h / 2);
                    ctx.strokeStyle = '#8e44ad';
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.h / 2);
                    ctx.lineTo(this.x + this.w, this.y + this.h / 2);
                    ctx.stroke();
                }
            }
        }

        class Bullet {
            constructor(x, y, vx, vy, isPlayerBullet) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 3;
                this.alive = true;
                this.isPlayerBullet = isPlayerBullet;
                this.trail = [];
            }

            update() {
                if (!this.alive) return;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();

                this.x += this.vx;
                this.y += this.vy;

                // 边界
                if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) {
                    this.alive = false;
                    return;
                }

                // 墙壁碰撞
                for (const wall of walls) {
                    if (!wall.alive) continue;
                    if (
                        this.x > wall.x && this.x < wall.x + wall.w &&
                        this.y > wall.y && this.y < wall.y + wall.h
                    ) {
                        if (wall.destroy()) {
                            createExplosion(wall.x + wall.w / 2, wall.y + wall.h / 2, 5);
                        } else {
                            createExplosion(this.x, this.y, 3);
                        }
                        this.alive = false;
                        return;
                    }
                }

                // 坦克碰撞
                if (this.isPlayerBullet) {
                    for (const enemy of enemies) {
                        if (enemy.alive && this.hitsTank(enemy)) {
                            this.alive = false;
                            if (enemy.takeDamage()) {
                                kills++;
                                score += 100 * level;
                                updateUI();
                            }
                            return;
                        }
                    }
                } else {
                    if (playerTank.alive && this.hitsTank(playerTank)) {
                        this.alive = false;
                        if (playerTank.takeDamage()) {
                            lives--;
                            updateUI();
                            if (lives <= 0) {
                                gameOver(false);
                            } else {
                                respawnPlayer();
                            }
                        }
                        return;
                    }
                }
            }

            hitsTank(tank) {
                const b = tank.getBounds();
                return (
                    this.x > b.x && this.x < b.x + b.w &&
                    this.y > b.y && this.y < b.y + b.h
                );
            }

            draw(ctx) {
                if (!this.alive) return;

                // 拖尾
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * 0.4;
                    const r = this.radius * (i / this.trail.length);
                    ctx.fillStyle = this.isPlayerBullet
                        ? `rgba(78, 205, 196, ${alpha})`
                        : `rgba(255, 107, 107, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 子弹主体
                ctx.fillStyle = this.isPlayerBullet ? '#4ecdc4' : '#ff6b6b';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 光晕
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, life, size = 2) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = size;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life--;
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = this.color.replace('1)', `${alpha})`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.type = type; // 'speed', 'rapid', 'shield', 'extra_life'
                this.alive = true;
                this.lifeTimer = 600; // 10秒
                this.bobOffset = 0;
                this.bobSpeed = 0.05;
            }

            update() {
                this.lifeTimer--;
                this.bobOffset = Math.sin(Date.now() * this.bobSpeed) * 3;
                if (this.lifeTimer <= 0) this.alive = false;

                if (playerTank.alive) {
                    const dx = (playerTank.x + playerTank.width / 2) - this.x;
                    const dy = (playerTank.y + playerTank.height / 2) - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < this.radius + playerTank.width / 2) {
                        this.collect();
                    }
                }
            }

            collect() {
                this.alive = false;
                sfxPowerUp();
                switch (this.type) {
                    case 'speed':
                        playerTank.speed = Math.min(playerTank.speed + 0.5, 5);
                        break;
                    case 'rapid':
                        playerTank.shootRate = Math.max(playerTank.shootRate - 5, 8);
                        break;
                    case 'shield':
                        playerTank.invincible = 180;
                        break;
                    case 'extra_life':
                        lives = Math.min(lives + 1, 5);
                        updateUI();
                        break;
                }
                createExplosion(this.x, this.y, 8);
            }

            draw(ctx) {
                if (!this.alive) return;
                const y = this.y + this.bobOffset;

                // 光晕
                const glowAlpha = 0.2 + Math.sin(Date.now() * 0.05) * 0.1;
                const colors = {
                    speed: `rgba(52, 152, 219, ${glowAlpha})`,
                    rapid: `rgba(231, 76, 60, ${glowAlpha})`,
                    shield: `rgba(46, 204, 113, ${glowAlpha})`,
                    extra_life: `rgba(241, 196, 15, ${glowAlpha})`,
                };
                ctx.fillStyle = colors[this.type];
                ctx.beginPath();
                ctx.arc(this.x, y, this.radius + 6, 0, Math.PI * 2);
                ctx.fill();

                // 主体
                const mainColors = {
                    speed: '#3498db',
                    rapid: '#e74c3c',
                    shield: '#2ecc71',
                    extra_life: '#f1c40f',
                };
                ctx.fillStyle = mainColors[this.type];
                ctx.beginPath();
                ctx.arc(this.x, y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 图标
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const icons = { speed: '⚡', rapid: '🔥', shield: '🛡️', extra_life: '❤️' };
                ctx.fillText(icons[this.type], this.x, y);

                // 倒计时环
                const progress = this.lifeTimer / 600;
                ctx.strokeStyle = mainColors[this.type];
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, y, this.radius + 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
                ctx.stroke();
            }
        }

        function createExplosion(x, y, count) {
            const colors = ['rgba(255, 165, 0, 1)', 'rgba(255, 69, 0, 1)', 'rgba(255, 215, 0, 1)', 'rgba(255, 255, 255, 1)'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const life = 15 + Math.floor(Math.random() * 20);
                const size = 1 + Math.random() * 3;
                particles.push(new Particle(x, y, vx, vy, color, life, size));
            }
            shakeTimer = 10;
            shakeIntensity = Math.min(count * 0.5, 6);
        }

        function spawnPowerUp(x, y) {
            const types = ['speed', 'rapid', 'shield', 'extra_life'];
            const weights = [0.3, 0.3, 0.25, 0.15];
            const r = Math.random();
            let cumulative = 0;
            let type = types[0];
            for (let i = 0; i < types.length; i++) {
                cumulative += weights[i];
                if (r <= cumulative) { type = types[i]; break; }
            }
            powerUps.push(new PowerUp(x, y, type));
        }

        // ==================== 敌人生成 ====================
        function spawnEnemy() {
            const spawnPoints = [
                { x: TILE * (COLS - 3), y: TILE * 2 },
                { x: TILE * 2, y: TILE * 2 },
                { x: TILE * (COLS - 3), y: TILE * (ROWS - 3) },
            ];

            // 避开玩家
            const validPoints = spawnPoints.filter(p => {
                if (!playerTank.alive) return true;
                const dx = p.x - playerTank.x;
                const dy = p.y - playerTank.y;
                return Math.sqrt(dx * dx + dy * dy) > 120;
            });

            const sp = validPoints.length > 0
                ? validPoints[Math.floor(Math.random() * validPoints.length)]
                : spawnPoints[Math.floor(Math.random() * spawnPoints.length)];

            // 检查该位置是否有坦克
            const occupied = enemies.some(e => e.alive &&
                Math.abs(e.x - sp.x) < TILE && Math.abs(e.y - sp.y) < TILE);
            if (occupied) return null;

            const colors = ['#e74c3c', '#e67e22', '#9b59b6', '#1abc9c', '#f39c12'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const enemy = new Tank(sp.x, sp.y, color, false);
            enemy.speed = 1.2 + level * 0.2 + Math.random() * 0.5;
            enemy.shootRate = Math.max(60 - level * 3, 25);
            enemy.aiShootChance = 0.015 + level * 0.003;
            return enemy;
        }

        function respawnPlayer() {
            playerTank.x = TILE * 2;
            playerTank.y = TILE * (ROWS - 3);
            playerTank.alive = true;
            playerTank.health = 3;
            playerTank.invincible = 120;
            playerTank.direction = 'up';
            playerTank.speed = 2.5;
            playerTank.shootRate = 20;
        }

        // ==================== AI ====================
        function updateEnemyAI(enemy) {
            if (!enemy.alive) return;

            enemy.aiTimer++;

            // 偶尔改变方向
            if (enemy.aiTimer >= enemy.aiDirectionChange) {
                enemy.aiTimer = 0;
                enemy.aiDirectionChange = 50 + Math.floor(Math.random() * 100);

                // 概率朝向玩家
                if (playerTank.alive && Math.random() < 0.3) {
                    const dx = playerTank.x - enemy.x;
                    const dy = playerTank.y - enemy.y;
                    if (Math.abs(dx) > Math.abs(dy)) {
                        enemy.direction = dx > 0 ? 'right' : 'left';
                    } else {
                        enemy.direction = dy > 0 ? 'down' : 'up';
                    }
                } else {
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.direction = dirs[Math.floor(Math.random() * dirs.length)];
                }
            }

            // 朝当前方向移动
            let dx = 0, dy = 0;
            switch (enemy.direction) {
                case 'up': dy = -enemy.speed; break;
                case 'down': dy = enemy.speed; break;
                case 'left': dx = -enemy.speed; break;
                case 'right': dx = enemy.speed; break;
            }

            // 如果被卡住就换方向
            if (!enemy.move(dx, dy)) {
                const dirs = ['up', 'down', 'left', 'right'].filter(d => d !== enemy.direction);
                enemy.direction = dirs[Math.floor(Math.random() * dirs.length)];
                enemy.aiTimer = enemy.aiDirectionChange - 10;
            }

            // AI射击
            if (enemy.shootCooldown <= 0 && Math.random() < enemy.aiShootChance) {
                const bullet = enemy.shoot();
                if (bullet) {
                    bullets.push(bullet);
                }
            }

            enemy.update();
        }

        // ==================== 初始化 & 重置 ====================
        function initGame() {
            score = 0;
            level = 1;
            lives = 3;
            kills = 0;
            bullets = [];
            particles = [];
            powerUps = [];
            shootCooldown = 0;
            enemySpawnTimer = 0;
            levelTransitionTimer = 0;
            shakeTimer = 0;
            shakeIntensity = 0;

            playerTank = new Tank(TILE * 2, TILE * (ROWS - 3), '#2ecc71', true);
            playerTank.health = 3;

            enemies = [];
            const map = generateMap(level);
            walls = buildWalls(map);

            // 生成初始敌人
            const enemyCount = 3 + level;
            for (let i = 0; i < enemyCount; i++) {
                const enemy = spawnEnemy();
                if (enemy) enemies.push(enemy);
            }

            updateUI();
        }

        function nextLevel() {
            level++;
            score += 200;
            bullets = [];
            particles = [];
            powerUps = [];
            enemySpawnTimer = 0;
            levelTransitionTimer = 60;
            shakeTimer = 0;
            shakeIntensity = 0;

            playerTank.alive = true;
            playerTank.health = 3;
            playerTank.invincible = 90;
            playerTank.x = TILE * 2;
            playerTank.y = TILE * (ROWS - 3);
            playerTank.direction = 'up';
            playerTank.speed = 2.5;
            playerTank.shootRate = 20;

            enemies = [];
            const map = generateMap(level);
            walls = buildWalls(map);

            const enemyCount = 3 + level;
            for (let i = 0; i < enemyCount; i++) {
                const enemy = spawnEnemy();
                if (enemy) enemies.push(enemy);
            }

            sfxLevelUp();
            updateUI();
            gameState = STATE.PLAYING;
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = lives;
            document.getElementById('kills').textContent = kills;
        }

        function gameOver(won) {
            gameState = STATE.GAMEOVER;
            const overlay = document.getElementById('gameOverOverlay');
            const title = document.getElementById('gameOverTitle');
            const finalScore = document.getElementById('finalScore');

            title.textContent = won ? '🎉 恭喜通关！' : '💥 游戏结束';
            finalScore.textContent = score;
            overlay.classList.add('active');
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('active');
            initGame();
            gameState = STATE.PLAYING;
        }

        window.restartGame = restartGame;

        // ==================== 输入处理 ====================
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key.toLowerCase() === 'r') {
                restartGame();
            }
            if (e.key.toLowerCase() === 'p') {
                if (gameState === STATE.PLAYING) {
                    gameState = STATE.PAUSED;
                } else if (gameState === STATE.PAUSED) {
                    gameState = STATE.PLAYING;
                }
            }

            initAudio();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            initAudio();
            mouse.down = true;
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', () => { mouse.down = false; });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener('mouseleave', () => { mouse.down = false; });

        // 移动端触摸控制
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            mouse.down = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            mouse.down = false;
        });

        // ==================== 主循环 ====================
        function handleInput() {
            if (!playerTank.alive && gameState !== STATE.GAMEOVER) return;

            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) { dy = -playerTank.speed; playerTank.direction = 'up'; }
            else if (keys['s'] || keys['arrowdown']) { dy = playerTank.speed; playerTank.direction = 'down'; }
            else if (keys['a'] || keys['arrowleft']) { dx = -playerTank.speed; playerTank.direction = 'left'; }
            else if (keys['d'] || keys['arrowright']) { dx = playerTank.speed; playerTank.direction = 'right'; }

            if (dx !== 0 || dy !== 0) {
                // 防止斜向移动过快
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }
                playerTank.move(dx, dy);
            }

            // 射击
            const shootKey = keys[' '] || keys['spacebar'];
            if (shootKey || mouse.down) {
                // 鼠标瞄准方向
                if (mouse.down && gameState === STATE.PLAYING) {
                    const cx = playerTank.x + playerTank.width / 2;
                    const cy = playerTank.y + playerTank.height / 2;
                    const angle = Math.atan2(mouse.y - cy, mouse.x - cx);
                    if (Math.abs(angle) < Math.PI / 4) playerTank.direction = 'right';
                    else if (Math.abs(angle) > 3 * Math.PI / 4) playerTank.direction = 'left';
                    else if (angle > 0) playerTank.direction = 'down';
                    else playerTank.direction = 'up';
                }

                if (playerTank.shootCooldown <= 0) {
                    const bullet = playerTank.shoot();
                    if (bullet) {
                        bullets.push(bullet);
                        sfxShoot();
                    }
                }
            }

            playerTank.update();
        }

        function update() {
            if (gameState !== STATE.PLAYING) return;

            if (levelTransitionTimer > 0) {
                levelTransitionTimer--;
                return;
            }

            handleInput();

            // 更新敌人AI
            for (const enemy of enemies) {
                updateEnemyAI(enemy);
            }

            // 更新子弹
            for (const bullet of bullets) {
                bullet.update();
            }

            // 更新粒子
            particles = particles.filter(p => p.update());

            // 清理死亡对象
            bullets = bullets.filter(b => b.alive);
            enemies = enemies.filter(e => e.alive);
            walls = walls.filter(w => w.alive);

            // 更新道具
            for (const pu of powerUps) {
                pu.update();
            }
            powerUps = powerUps.filter(p => p.alive);

            // 屏幕震动
            if (shakeTimer > 0) shakeTimer--;

            // 检查是否所有敌人被消灭
            const aliveEnemies = enemies.filter(e => e.alive);
            if (aliveEnemies.length === 0 && gameState === STATE.PLAYING) {
                nextLevel();
            }

            // 定期生成敌人(如果太少)
            enemySpawnTimer++;
            const maxEnemies = 4 + level;
            if (aliveEnemies.length < maxEnemies && enemySpawnTimer > 300) {
                enemySpawnTimer = 0;
                const enemy = spawnEnemy();
                if (enemy) enemies.push(enemy);
            }

            // 随机掉落道具
            if (Math.random() < 0.0005 && powerUps.length < 2) {
                const x = TILE + Math.random() * (W - TILE * 2);
                const y = TILE + Math.random() * (H - TILE * 2);
                spawnPowerUp(x, y);
            }

            // 击杀一定敌人后掉落道具
            if (kills > 0 && kills % 10 === 0 && powerUps.length < 2 && Math.random() < 0.02) {
                const x = TILE + Math.random() * (W - TILE * 2);
                const y = TILE + Math.random() * (H - TILE * 2);
                spawnPowerUp(x, y);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 屏幕震动偏移
            let shakeX = 0, shakeY = 0;
            if (shakeTimer > 0) {
                shakeX = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 10);
                shakeY = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 10);
            }

            ctx.save();
            ctx.translate(shakeX, shakeY);

            // 地面网格
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= W; x += TILE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += TILE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // 绘制墙壁
            for (const wall of walls) {
                wall.draw(ctx);
            }

            // 绘制道具
            for (const pu of powerUps) {
                pu.draw(ctx);
            }

            // 绘制坦克
            if (playerTank.alive) playerTank.draw(ctx);
            for (const enemy of enemies) {
                if (enemy.alive) enemy.draw(ctx);
            }

            // 绘制子弹
            for (const bullet of bullets) {
                bullet.draw(ctx);
            }

            // 绘制粒子
            for (const particle of particles) {
                particle.draw(ctx);
            }

            ctx.restore();

            // 暂停提示
            if (gameState === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ 暂停', W / 2, H / 2);
                ctx.font = '16px "Courier New"';
                ctx.fillText('按 P 继续', W / 2, H / 2 + 40);
            }

            // 菜单提示
            if (gameState === STATE.MENU) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 48px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('🎮 坦克大战', W / 2, H / 2 - 30);
                ctx.fillStyle = '#fff';
                ctx.font = '18px "Courier New"';
                ctx.fillText('点击屏幕开始游戏', W / 2, H / 2 + 20);
                ctx.fillText('WASD 移动 | 空格/鼠标 射击', W / 2, H / 2 + 50);
            }

            // 关卡过渡
            if (levelTransitionTimer > 0) {
                const alpha = levelTransitionTimer < 30
                    ? (levelTransitionTimer / 30) * 0.8
                    : 0.8;
                ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#f0c040';
                ctx.font = 'bold 36px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText(`第 ${level} 关`, W / 2, H / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ==================== 启动游戏 ====================
        initGame();

        // 点击canvas开始
        canvas.addEventListener('click', () => {
            initAudio();
            if (gameState === STATE.MENU) {
                gameState = STATE.PLAYING;
            }
        });

        gameLoop();
        console.log('🎮 坦克大战已就绪！');
        console.log('WASD - 移动 | 空格/鼠标 - 射击 | P - 暂停 | R - 重新开始');
    </script>
</body>
